{{- /* Giscus 评论系统 - 基于 GitHub Discussions */ -}}
{{- /* 配置步骤： */ -}}
{{- /* 1. GitHub 仓库 Settings → Features → 勾选 Discussions */ -}}
{{- /* 2. 访问 https://giscus.app 填入 yanchuaner/blog-hugo 自动生成 */ -}}
{{- /* 3. 将生成的 data-repo-id 和 data-category-id 填入下方 */ -}}
<script src="https://giscus.app/client.js"
        data-repo="yanchuaner/blog-hugo"
        data-repo-id=""
        data-category="Announcements"
        data-category-id=""
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="preferred_color_scheme"
        data-lang="zh-CN"
        data-loading="lazy"
        crossorigin="anonymous"
        async>
</script>
