<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线空间 | Eon</title>
  <style>
    :root {
      --bg-color: #1d1e20;
      --text-color: #e3e3e3;
      --accent-color: #2e2e33;
      --border-color: #333333;
      --primary-color: #ffffff;
      --secondary-color: #999999;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-color: #f8f9fa;
        --text-color: #212529;
        --accent-color: #ffffff;
        --border-color: #e9ecef;
        --primary-color: #000000;
        --secondary-color: #6c757d;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
      background-color: var(--accent-color);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 40px 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .icon {
      margin-bottom: 24px;
      color: var(--secondary-color);
      display: inline-block;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: var(--secondary-color);
      margin-bottom: 30px;
    }

    .tips {
      font-size: 13px;
      background-color: rgba(0, 0, 0, 0.03);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 30px;
      text-align: left;
      border-left: 3px solid var(--secondary-color);
    }

    @media (prefers-color-scheme: dark) {
      .tips {
        background-color: rgba(255, 255, 255, 0.02);
      }
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background-color: var(--primary-color);
      color: var(--bg-color);
      padding: 12px 28px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.2s ease;
    }

    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5"></path>
        <path d="M5 12.5a10.94 10.94 0 0 1 5.83-2.84"></path>
        <path d="M12 18.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"></path>
        <path d="M10.18 5.7a16.53 16.53 0 0 1 7.22 1.9"></path>
        <path d="M6.6 7.6a16.52 16.52 0 0 1 3.58-1.9"></path>
      </svg>
    </div>
    <h1>离线空间</h1>
    <p>当前网络连接已断开，您已进入离线阅读模式。</p>
    
    <div class="tips">
      💡 <strong>小提示</strong>：<br>
      • 您之前已访问并阅读过的文章已自动缓存，可以在离线状态下继续浏览。<br>
      • 核心页面（如首页、项目页、关于我等）均支持离线加载。
    </div>

    <a href="/" class="btn">返回首页</a>
  </div>
</body>
</html>
