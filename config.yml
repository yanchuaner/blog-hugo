# 起始 URL
baseURL: 'https://blog.codequest.com.cn'
title: '黄湘林的个人博客'
pagination:
  pagerSize: 5
theme: PaperMod
languageCode: 'zh'
DefaultContentLanguage: 'zh'
hasCJKLanguage: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
enableGitInfo: false
googleAnalytics: ''
minify:
  disableXML: true
  minifyOutput: true
params:
  env: production
  title: '黄湘林的个人博客'
  description: '记录算法、AI 实践与项目成长。'
  keywords: ['算法', 'ACM', 'AI', '鸿蒙', 'C++']
  author: '黄湘林'
  DateFormat: '2006-01-02'
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false
  assets:
    favicon: ''
    favicon16x16: ''
    favicon32x32: ''
    apple_touch_icon: ''
    safari_pinned_tab: ''
  label:
    text: 'HXL''s Blog'
    icon: ''
    iconHeight: 35
  profileMode:
    enabled: false
  homeInfoParams_disabled:
    Title: "Hi there \U0001F44B"
    Content: >
      欢迎来到我的博客。这里记录算法学习、AI 实践与项目成长。
  socialIcons:
    - name: github
      url: 'https://github.com/yanchuaner'
    - name: rss
      url: 'index.xml'
  analytics:
    google:
      SiteVerificationTag: ''
    bing:
      SiteVerificationTag: ''
    yandex:
      SiteVerificationTag: ''
  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false
  editPost:
    URL: ''
    Text: ''
    appendFilePath: false
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ['title', 'permalink', 'summary', 'content']
menu:
  main:
    - identifier: '首页'
      name: '首页'
      url: /
      weight: 1
    - identifier: archives
      name: '归档'
      url: /archives/
      weight: 2
    - identifier: '分类'
      name: '分类'
      url: /categories/
      weight: 10
    - identifier: '标签'
      name: '标签'
      url: /tags/
      weight: 20
    - identifier: '关于'
      name: '关于'
      url: /about/
      weight: 25
    - identifier: '项目'
      name: '项目'
      url: /about/#projects
      weight: 30
    - identifier: '留言板'
      name: '留言板'
      url: /guestbook/
      weight: 35
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
privacy:
  vimeo:
    disabled: true
  twitter:
    disabled: true
  instagram:
    disabled: true
  youtube:
    disabled: true
    privacyEnhanced: true



