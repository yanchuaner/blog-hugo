baseURL: 'https://blog.codequest.com.cn'
title: 'Eon | 算法 · 系统 · 硬件'
pagination:
  pagerSize: 5
theme: PaperMod
languageCode: 'zh'
DefaultContentLanguage: 'zh'
hasCJKLanguage: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
enableGitInfo: false
googleAnalytics: ''
outputs:
  home:
    - HTML
    - RSS
    - JSON
minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: 'Eon | 算法 · 系统 · 硬件'
  description: >
    华南理工大学计算机专业学生，ACM 集训队成员。专注于算法竞赛、底层系统开发与硬件底层设计——项目驱动、实战检验、持续迭代。
  keywords: ['ACM', '算法竞赛', '数据结构', 'C++', 'Linux', 'Verilog', 'FPGA', '计算机体系结构']
  author: 'Eon'
  DateFormat: '2006-01-02'
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: true
  comments: true
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false
  assets:
    favicon: '/favicon.ico'
    favicon16x16: '/favicon-16x16.png'
    favicon32x32: '/favicon-32x32.png'
    apple_touch_icon: '/apple-touch-icon.png'
    safari_pinned_tab: '/safari-pinned-tab.svg'
  label:
    text: 'Eon'
    icon: ''
    iconHeight: 35
  profileMode:
    enabled: false
  socialIcons:
    - name: github
      url: 'https://github.com/yanchuaner'
    - name: rss
      url: 'index.xml'
  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false
  editPost:
    URL: ''
    Text: ''
    appendFilePath: false
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ['title', 'permalink', 'summary', 'content']

menu:
  main:
    - identifier: 'home'
      name: '首页'
      url: /
      weight: 1
    - identifier: 'posts'
      name: '文章'
      url: /posts/
      weight: 2
    - identifier: 'projects'
      name: '项目'
      url: /projects/
      weight: 3
    - identifier: 'about'
      name: '关于'
      url: /about/
      weight: 4
    - identifier: 'search'
      name: '搜索'
      url: /search/
      weight: 5
    - identifier: 'friends'
      name: '友链'
      url: /friends/
      weight: 6

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false

privacy:
  vimeo:
    disabled: true
  twitter:
    disabled: true
  instagram:
    disabled: true
  youtube:
    disabled: true
    privacyEnhanced: true
