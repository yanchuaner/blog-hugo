baseURL: 'https://blog.codequest.com.cn'
title: '黄湘林 | 信息安全 · AI · 系统开发'
pagination:
  pagerSize: 5
theme: PaperMod
languageCode: 'zh'
DefaultContentLanguage: 'zh'
hasCJKLanguage: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
enableGitInfo: false
googleAnalytics: ''
minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: '黄湘林 | 信息安全 · AI · 系统开发'
  description: >
    华南理工大学计算机专业学生，ACM集训队成员。专注信息安全（二进制安全/AI安全）、
    系统底层开发与AI应用实践。博客记录算法竞赛、项目复盘与技术思考——项目驱动、实战检验、持续迭代。
  keywords: ['信息安全', '二进制安全', 'AI安全', 'ACM', '算法', '鸿蒙', 'C++', '系统开发', 'LangChain', 'DeepSeek']
  author: '黄湘林'
  DateFormat: '2006-01-02'
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: true
  comments: true
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false
  assets:
    favicon: '/favicon.ico'
    favicon16x16: '/favicon-16x16.png'
    favicon32x32: '/favicon-32x32.png'
    apple_touch_icon: '/apple-touch-icon.png'
    safari_pinned_tab: '/safari-pinned-tab.svg'
  label:
    text: '黄湘林'
    icon: ''
    iconHeight: 35
  profileMode:
    enabled: false
  socialIcons:
    - name: github
      url: 'https://github.com/yanchuaner'
    - name: rss
      url: 'index.xml'
  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false
  editPost:
    URL: ''
    Text: ''
    appendFilePath: false
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ['title', 'permalink', 'summary', 'content']

menu:
  main:
    - identifier: 'home'
      name: '首页'
      url: /
      weight: 1
    - identifier: 'posts'
      name: '文章'
      url: /posts/
      weight: 2
    - identifier: 'projects'
      name: '项目'
      url: /projects/
      weight: 3
    - identifier: 'about'
      name: '关于'
      url: /about/
      weight: 4

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false

privacy:
  vimeo:
    disabled: true
  twitter:
    disabled: true
  instagram:
    disabled: true
  youtube:
    disabled: true
    privacyEnhanced: true
